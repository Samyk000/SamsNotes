      function exportAll() {
        const payload = {
          app: "SamsNotes",
          version: 3,
          exportedAt: new Date().toISOString(),
          theme: state.theme,
          sidebarCollapsed: state.sidebarCollapsed,
          folders: state.folders,
          tags: state.tags,
          notes: state.notes
        };

        const date = new Date().toISOString().slice(0, 10);
        downloadFile("samsnotes-" + date + ".json", JSON.stringify(payload, null, 2), "application/json;charset=utf-8");
        showToast("All notes exported.");
      }

      async function importData(file) {
        if (!file) return;

        try {
          const text = await file.text();
          const parsed = JSON.parse(text);

          const importedFolders = Array.isArray(parsed.folders) ? parsed.folders.map(normalizeFolder).filter(item => item.title) : [];
          const importedTags = Array.isArray(parsed.tags) ? parsed.tags.map(normalizeTag).filter(item => item.title) : [];
          const importedNotes = Array.isArray(parsed.notes)
            ? parsed.notes.map(normalizeNote)
            : Array.isArray(parsed)
              ? parsed.map(normalizeNote)
              : [];

          if (!importedNotes.length && !importedFolders.length && !importedTags.length) {
            throw new Error("Nothing to import");
          }

          const folderMap = new Map(state.folders.map(item => [item.id, item]));
          for (const folder of importedFolders) folderMap.set(folder.id, folder);
          state.folders = Array.from(folderMap.values());

          const tagMap = new Map(state.tags.map(item => [item.id, item]));
          for (const tag of importedTags) tagMap.set(tag.id, tag);
          state.tags = Array.from(tagMap.values());

          const noteMap = new Map(state.notes.map(item => [item.id, item]));
          for (const note of importedNotes) {
            const existing = noteMap.get(note.id);
            if (!existing || note.updatedAt >= existing.updatedAt) noteMap.set(note.id, note);
          }
          state.notes = Array.from(noteMap.values());

          cleanupReferences();
          renderApp();
          schedulePersist();
          showToast("Import complete.");
        } catch (error) {
          console.error(error);
          showToast("Import failed. Use a SamsNotes JSON export.");
        } finally {
          els.importInput.value = "";
        }
      }

      function focusEditor() {
        els.editorBody.focus({ preventScroll: true });
      }

      function execEditorCommand(command, value = null) {
        const note = getNote();
        if (!note || note.trashed) return;
        focusEditor();
        document.execCommand(command, false, value);
        syncEditorPlaceholder();
        scheduleEditorSync();
        renderToolbarState();
      }

      function toggleBlock(tag) {
        const note = getNote();
        if (!note || note.trashed) return;

        focusEditor();

        let currentTag = "";
        const selection = window.getSelection();
        if (selection && selection.rangeCount) {
          let node = selection.anchorNode;
          node = node && node.nodeType === 3 ? node.parentElement : node;
          currentTag = node && node.closest ? (node.closest("h1,h2,blockquote,pre")?.tagName || "") : "";
        }

        const next = currentTag === tag ? "P" : tag;
        document.execCommand("formatBlock", false, next);
        syncEditorPlaceholder();
        scheduleEditorSync();
        renderToolbarState();
      }

      function insertPlainTextAtCursor(text) {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) return false;

        const range = selection.getRangeAt(0);
        range.deleteContents();

        const lines = String(text || "").split(/\r?\n/);
        const frag = document.createDocumentFragment();

        lines.forEach((line, index) => {
          if (index > 0) frag.appendChild(document.createElement("br"));
          frag.appendChild(document.createTextNode(line));
        });

        range.insertNode(frag);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
        return true;
      }

      function clearFormatting() {
        const note = getNote();
        if (!note || note.trashed) return;
        focusEditor();
        document.execCommand("removeFormat", false, null);
        document.execCommand("unlink", false, null);
        syncEditorPlaceholder();
        scheduleEditorSync();
        renderToolbarState();
      }

      function openDialog(config) {
        return new Promise(resolve => {
          state.dialogResolve = resolve;
          state.dialogSubmit = () => {
            const result = typeof config.onConfirm === "function" ? config.onConfirm() : { confirmed: true };
            if (result === false) return;
            closeDialog(result || { confirmed: true });
          };
          state.dialogBodyClick = typeof config.onBodyClick === "function" ? config.onBodyClick : null;

          els.dialogTitle.textContent = config.title || "";
          els.dialogText.textContent = config.text || "";
          els.dialogText.classList.toggle("hidden", !config.text);
          els.dialogBody.innerHTML = config.bodyHTML || "";
          els.dialogConfirmBtn.textContent = config.confirmText || "Save";
          els.dialogConfirmBtn.classList.toggle("primary", !config.destructive);
          els.dialogConfirmBtn.classList.toggle("danger-fill", Boolean(config.destructive));
          els.dialogBackdrop.classList.add("show");
          els.dialogBackdrop.setAttribute("aria-hidden", "false");

          requestAnimationFrame(() => {
            if (typeof config.onOpen === "function") config.onOpen();
            else els.dialogConfirmBtn.focus();
          });
        });
      }

      function closeDialog(result = { confirmed: false }) {
        els.dialogBackdrop.classList.remove("show");
        els.dialogBackdrop.setAttribute("aria-hidden", "true");
        state.dialogBodyClick = null;
        state.dialogSubmit = null;
        const resolve = state.dialogResolve;
        state.dialogResolve = null;
        if (resolve) resolve(result);
      }

      function setDialogError(message) {
        const error = els.dialogBody.querySelector("#dialogError");
        if (error) error.textContent = message || "";
      }

      async function promptEntity(kind) {
        const currentItems = kind === "folder" ? state.folders : state.tags;
        const label = kind === "folder" ? "folder" : "tag";
        let selectedIconKey = kind === "folder" ? "briefcase" : "star";

        return openDialog({
          title: "New " + label,
          text: "Add a " + label + " name and choose an icon.",
          confirmText: "Create",
          bodyHTML: `
            <label class="field">
              <span>Title</span>
              <input id="entityTitle" type="text" maxlength="40" placeholder="${label === "folder" ? "Work" : "Ideas"}" />
            </label>
            <div class="field">
              <span>Icon</span>
              <div class="icon-pick-grid">
                ${ENTITY_ICONS.map(icon => `
                  <button class="pick-icon ${icon.key === selectedIconKey ? "active" : ""}" type="button" data-pick-icon="${icon.key}" title="${escapeHtml(icon.label)}">
                    <span class="pick-icon-badge" style="--entity-color:${icon.color}">
                      <svg class="icon"><use href="${icon.symbol}"></use></svg>
                    </span>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="dialog-error" id="dialogError"></div>
          `,
          onOpen() {
            const input = document.getElementById("entityTitle");
            if (input) input.focus();
          },
          onBodyClick(event) {
            const btn = event.target.closest("[data-pick-icon]");
            if (!btn) return;
            selectedIconKey = btn.getAttribute("data-pick-icon") || selectedIconKey;
            for (const item of els.dialogBody.querySelectorAll("[data-pick-icon]")) {
              item.classList.toggle("active", item.getAttribute("data-pick-icon") === selectedIconKey);
            }
          },
          onConfirm() {
            const input = document.getElementById("entityTitle");
            const title = normalizeSpace(input?.value).slice(0, 40);

            if (!title) {
              setDialogError("Please enter a title.");
              return false;
            }

            const duplicate = currentItems.some(item => item.title.toLowerCase() === title.toLowerCase());
            if (duplicate) {
              setDialogError("That " + label + " already exists.");
              return false;
            }

            return { confirmed: true, title, iconKey: selectedIconKey };
          }
        });
      }

      async function confirmAction(title, text, confirmText, destructive = false) {
        return openDialog({
          title,
          text,
          confirmText,
          destructive
        });
      }

      async function promptLink() {
        return openDialog({
          title: "Insert link",
          text: "Paste a URL to add a clean link.",
          confirmText: "Insert",
          bodyHTML: `
            <label class="field">
              <span>URL</span>
              <input id="linkInput" type="text" placeholder="https://example.com" />
            </label>
            <div class="dialog-error" id="dialogError"></div>
          `,
          onOpen() {
            const input = document.getElementById("linkInput");
            if (input) input.focus();
          },
          onConfirm() {
            const input = document.getElementById("linkInput");
            const url = sanitizeUrl(input?.value);
            if (!url) {
              setDialogError("Please enter a valid URL.");
              return false;
            }
            return { confirmed: true, url };
          }
        });
      }

      async function pickTags(note) {
        const selected = new Set(note.tags);

        return openDialog({
          title: "Tags",
          text: state.tags.length ? "Select tags for this note." : "Create tags from the sidebar first.",
          confirmText: "Done",
          bodyHTML: state.tags.length
            ? `
                <div class="pick-grid">
                  ${[...state.tags].sort((a, b) => a.title.localeCompare(b.title)).map(tag => {
                    const icon = getEntityIcon(tag.iconKey);
                    return `
                      <button class="pick-chip ${selected.has(tag.id) ? "active" : ""}" type="button" data-pick-tag="${tag.id}">
                        <span class="pick-icon-badge" style="--entity-color:${icon.color}">
                          <svg class="icon"><use href="${icon.symbol}"></use></svg>
                        </span>
                        <span>#${escapeHtml(tag.title)}</span>
                      </button>
                    `;
                  }).join("")}
                </div>
                <div class="dialog-error" id="dialogError"></div>
              `
            : `<div class="hint-chip">No tags available</div>`,
          onBodyClick(event) {
            const chip = event.target.closest("[data-pick-tag]");
            if (!chip) return;
            const tagId = chip.getAttribute("data-pick-tag");
            if (!tagId) return;
            if (selected.has(tagId)) selected.delete(tagId);
            else selected.add(tagId);
            chip.classList.toggle("active", selected.has(tagId));
          },
          onConfirm() {
            return { confirmed: true, tags: [...selected] };
          }
        });
      }

      async function removeCollection(kind, id) {
        const item = kind === "folder" ? getFolder(id) : getTag(id);
        if (!item) return;

        const count = kind === "folder" ? folderCount(id) : tagCount(id);
        const result = await confirmAction(
          "Delete " + kind + "?",
          count
            ? `This ${kind} is used by ${count} note${count === 1 ? "" : "s"}. Notes will stay saved.`
            : `This ${kind} will be removed.`,
          "Delete",
          true
        );

        if (!result.confirmed) return;

        if (kind === "folder") {
          state.folders = state.folders.filter(folder => folder.id !== id);
          for (const note of state.notes) {
            if (note.folderId === id) note.folderId = null;
          }
        } else {
          state.tags = state.tags.filter(tag => tag.id !== id);
          for (const note of state.notes) {
            note.tags = note.tags.filter(tagId => tagId !== id);
          }
        }

        cleanupReferences();
        renderApp();
        schedulePersist();
        showToast(kind === "folder" ? "Folder deleted." : "Tag deleted.");
      }

      async function handleNoteAction(action, noteId) {
        const note = getNote(noteId);
        if (!note) return;
        state.openNoteMenuId = null;

        if (action === "pin") {
          if (note.trashed || note.archived) return;
          note.pinned = !note.pinned;
          note.updatedAt = now();
          renderApp();
          schedulePersist();
          showToast(note.pinned ? "Pinned." : "Unpinned.");
          return;
        }

        if (action === "archive") {
          if (note.trashed) return;
          note.archived = !note.archived;
          if (note.archived) note.pinned = false;
          note.updatedAt = now();
          renderApp();
          schedulePersist();
          showToast(note.archived ? "Archived." : "Moved out of archive.");
          return;
        }

        if (action === "duplicate") {
          duplicateNote(noteId);
          return;
        }

        if (action === "export") {
          exportNote(note);
          renderBoard();
          return;
        }

        if (action === "trash") {
          note.trashed = true;
          note.archived = false;
          note.pinned = false;
          note.updatedAt = now();
          renderApp();
          schedulePersist();
          showToast("Moved to trash.");
          return;
        }

        if (action === "restore") {
          note.trashed = false;
          note.updatedAt = now();
          renderApp();
          schedulePersist();
          showToast("Restored.");
          return;
        }

        if (action === "delete") {
          const result = await confirmAction(
            "Delete forever?",
            "This note will be permanently removed from local storage.",
            "Delete",
            true
          );

          if (!result.confirmed) {
            renderBoard();
            return;
          }

          state.notes = state.notes.filter(item => item.id !== noteId);
          if (state.activeNoteId === noteId) {
            state.activeNoteId = null;
            state.editorOpen = false;
            state.renderedNoteId = null;
          }
          renderApp();
          schedulePersist();
          showToast("Deleted permanently.");
        }
      }

      async function deleteAllNotes() {
        if (!state.notes.length) {
          showToast("There are no notes to delete.");
          return;
        }

        const result = await confirmAction(
          "Delete all notes?",
          "Every saved note on this device will be removed. Folders and tags will stay.",
          "Delete all",
          true
        );

        if (!result.confirmed) return;

        state.notes = [];
        state.activeNoteId = null;
        state.editorOpen = false;
        state.renderedNoteId = null;
        renderApp();
        schedulePersist();
        showToast("All notes deleted.");
      }

      function handleToolbarClick(event) {
        const btn = event.target.closest(".toolbar-btn");
        if (!btn || btn.disabled) return;

        const cmd = btn.getAttribute("data-cmd");
        const block = btn.getAttribute("data-block");
        const action = btn.getAttribute("data-action");

        if (cmd) execEditorCommand(cmd);
        if (block) toggleBlock(block);
        if (action === "clear") clearFormatting();
        if (action === "link") {
          saveSelection();
          promptLink().then(result => {
            if (!result.confirmed || !result.url) return;
            restoreSelection();
            focusEditor();
            const selection = window.getSelection();
            const selectedText = selection ? selection.toString() : "";
            if (selectedText) {
              document.execCommand("createLink", false, result.url);
            } else {
              document.execCommand("insertHTML", false, `<a href="${escapeHtml(result.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(result.url)}</a>`);
            }
            syncEditorPlaceholder();
            scheduleEditorSync();
            renderToolbarState();
          });
        }
      }

      function loadState() {
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        state.theme = prefersDark ? "dark" : "light";

        let parsed = null;

        try {
          const current = localStorage.getItem(STORAGE_KEY);
          if (current) parsed = JSON.parse(current);
          else {
            const legacy = localStorage.getItem(LEGACY_KEY);
            if (legacy) parsed = JSON.parse(legacy);
          }
        } catch {
          parsed = null;
        }

        if (!parsed) {
          state.notes = [];
          state.folders = [];
          state.tags = [];
          state.view = { kind: "system", id: "all" };
          state.activeNoteId = null;
          state.editorOpen = false;
          state.sidebarCollapsed = false;
          return;
        }

        state.theme = parsed.theme === "dark" ? "dark" : state.theme;
        state.sidebarCollapsed = parsed.sidebarCollapsed === true;

        state.view = parsed.view && typeof parsed.view === "object"
          ? {
              kind: ["system", "folder", "tag"].includes(parsed.view.kind) ? parsed.view.kind : "system",
              id: typeof parsed.view.id === "string" ? parsed.view.id : "all"
            }
          : { kind: "system", id: "all" };

        state.notes = Array.isArray(parsed.notes) ? parsed.notes.map(normalizeNote) : [];
        state.folders = Array.isArray(parsed.folders) ? parsed.folders.map(normalizeFolder).filter(item => item.title) : [];
        state.tags = Array.isArray(parsed.tags) ? parsed.tags.map(normalizeTag).filter(item => item.title) : [];

        const seenFolders = new Set();
        state.folders = state.folders.filter(folder => seenFolders.has(folder.id) ? false : (seenFolders.add(folder.id), true));

        const seenTags = new Set();
        state.tags = state.tags.filter(tag => seenTags.has(tag.id) ? false : (seenTags.add(tag.id), true));

        cleanupReferences();
      }

      function bindEvents() {
        els.sidebarToggleBtn.addEventListener("click", toggleSidebar);
        els.mobileScrim.addEventListener("click", closeMobileSidebar);

        els.newNoteBtn.addEventListener("click", createNote);

        els.themeBtn.addEventListener("click", () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          renderTheme();
          schedulePersist();
        });

        els.settingsBtn.addEventListener("click", event => {
          event.stopPropagation();
          state.settingsOpen = !state.settingsOpen;
          state.openNoteMenuId = null;
          renderHeader();
          renderBoard();
        });

        els.settingsMenu.addEventListener("click", event => {
          const btn = event.target.closest("[data-settings-action]");
          if (!btn) return;
          const action = btn.getAttribute("data-settings-action");
          state.settingsOpen = false;
          renderHeader();

          if (action === "import") els.importInput.click();
          if (action === "export") exportAll();
          if (action === "delete-all") deleteAllNotes();
        });

        els.importInput.addEventListener("change", event => {
          importData(event.target.files?.[0]);
        });

        els.searchInput.addEventListener("input", () => {
          state.query = els.searchInput.value;
          state.openNoteMenuId = null;
          renderHeader();
          renderBoard();
        });

        els.systemFilters.addEventListener("click", event => {
          const btn = event.target.closest("[data-view-kind='system']");
          if (!btn) return;
          state.view = { kind: "system", id: btn.getAttribute("data-view-id") || "all" };
          state.openNoteMenuId = null;
          renderApp();
          schedulePersist();
          closeMobileSidebar();
        });

        els.foldersList.addEventListener("click", event => {
          const removeBtn = event.target.closest("[data-remove-kind='folder']");
          if (removeBtn) {
            removeCollection("folder", removeBtn.getAttribute("data-remove-id"));
            return;
          }

          const btn = event.target.closest("[data-view-kind='folder']");
          if (!btn) return;
          state.view = { kind: "folder", id: btn.getAttribute("data-view-id") || "" };
          state.openNoteMenuId = null;
          renderApp();
          schedulePersist();
          closeMobileSidebar();
        });

        els.tagsList.addEventListener("click", event => {
          const removeBtn = event.target.closest("[data-remove-kind='tag']");
          if (removeBtn) {
            removeCollection("tag", removeBtn.getAttribute("data-remove-id"));
            return;
          }

          const btn = event.target.closest("[data-view-kind='tag']");
          if (!btn) return;
          state.view = { kind: "tag", id: btn.getAttribute("data-view-id") || "" };
          state.openNoteMenuId = null;
          renderApp();
          schedulePersist();
          closeMobileSidebar();
        });

        els.addFolderBtn.addEventListener("click", async () => {
          const result = await promptEntity("folder");
          if (!result.confirmed) return;
          const icon = getEntityIcon(result.iconKey);
          state.folders.push({
            id: uid(),
            title: result.title,
            iconKey: icon.key,
            color: icon.color,
            createdAt: now()
          });
          renderSidebar();
          renderEditorPanel();
          schedulePersist();
          showToast("Folder created.");
        });

        els.addTagBtn.addEventListener("click", async () => {
          const result = await promptEntity("tag");
          if (!result.confirmed) return;
          const icon = getEntityIcon(result.iconKey);
          state.tags.push({
            id: uid(),
            title: result.title,
            iconKey: icon.key,
            color: icon.color,
            createdAt: now()
          });
          renderSidebar();
          renderEditorPanel();
          schedulePersist();
          showToast("Tag created.");
        });

        els.notesGrid.addEventListener("click", event => {
          const emptyAction = event.target.closest("[data-empty-action]");
          if (emptyAction) {
            const action = emptyAction.getAttribute("data-empty-action");
            if (action === "create") createNote();
            if (action === "clear-search") {
              state.query = "";
              renderHeader();
              renderBoard();
            }
            return;
          }

          const actionBtn = event.target.closest("[data-note-action]");
          if (actionBtn) {
            event.stopPropagation();
            handleNoteAction(
              actionBtn.getAttribute("data-note-action"),
              actionBtn.getAttribute("data-note-id")
            );
            return;
          }

          const menuBtn = event.target.closest("[data-note-menu]");
          if (menuBtn) {
            event.stopPropagation();
            const noteId = menuBtn.getAttribute("data-note-menu");
            state.settingsOpen = false;
            state.openNoteMenuId = state.openNoteMenuId === noteId ? null : noteId;
            renderHeader();
            renderBoard();
            return;
          }

          if (event.target.closest(".note-menu-wrap")) return;

          const card = event.target.closest("[data-note-card]");
          if (card) openEditor(card.getAttribute("data-note-card"));
        });

        els.notesGrid.addEventListener("keydown", event => {
          const card = event.target.closest("[data-note-card]");
          if (!card) return;
          if ((event.key === "Enter" || event.key === " ") && !event.target.closest("button")) {
            event.preventDefault();
            openEditor(card.getAttribute("data-note-card"));
          }
        });

        els.editorBackdrop.addEventListener("click", closeEditor);
        els.editorCloseBtn.addEventListener("click", closeEditor);

        els.editorTitleInput.addEventListener("input", updateTitleInput);
        els.editorTitleInput.addEventListener("blur", () => {
          processActiveNoteFromEditor({ sanitize: true, syncDOM: false });
          persistNow();
          renderHeader();
          renderBoard();
        });

        els.folderSelect.addEventListener("change", updateFolderAssignment);
        els.fontSizeSelect.addEventListener("change", updateFontSize);

        els.tagPickerBtn.addEventListener("click", async () => {
          const note = getNote();
          if (!note || note.trashed) return;
          const result = await pickTags(note);
          if (!result.confirmed) return;
          note.tags = result.tags.filter(tagId => state.tags.some(tag => tag.id === tagId));
          note.updatedAt = now();
          renderSelectedTags(note.tags);
          renderSidebar();
          renderHeader();
          renderBoard();
          renderEditorStatus();
          schedulePersist();
        });

        els.editorBody.addEventListener("input", () => {
          if (state.syncingEditor) return;
          syncEditorPlaceholder();
          saveSelection();
          scheduleEditorSync();
        });

        els.editorBody.addEventListener("blur", () => {
          processActiveNoteFromEditor({ sanitize: true, syncDOM: true });
          syncEditorPlaceholder();
          renderHeader();
          renderBoard();
          persistNow();
        });

        els.editorBody.addEventListener("keyup", () => {
          saveSelection();
          renderToolbarState();
        });

        els.editorBody.addEventListener("mouseup", () => {
          saveSelection();
          renderToolbarState();
        });

        els.editorBody.addEventListener("paste", event => {
          event.preventDefault();
          const text = event.clipboardData?.getData("text/plain") || "";
          const inserted = document.execCommand("insertText", false, text);
          if (!inserted) insertPlainTextAtCursor(text);
          syncEditorPlaceholder();
          scheduleEditorSync();
        });

        els.toolbar.addEventListener("click", handleToolbarClick);

        document.addEventListener("selectionchange", () => {
          saveSelection();
          renderToolbarState();
        });

        document.addEventListener("click", event => {
          if (state.settingsOpen && !event.target.closest("#settingsWrap")) {
            state.settingsOpen = false;
            renderHeader();
          }

          if (state.openNoteMenuId && !event.target.closest(".note-menu-wrap")) {
            state.openNoteMenuId = null;
            renderBoard();
          }
        });

        els.dialogBody.addEventListener("click", event => {
          if (state.dialogBodyClick) state.dialogBodyClick(event);
        });

        els.dialogCloseBtn.addEventListener("click", () => closeDialog());
        els.dialogCancelBtn.addEventListener("click", () => closeDialog());
        els.dialogConfirmBtn.addEventListener("click", () => {
          if (state.dialogSubmit) state.dialogSubmit();
        });
        els.dialogBackdrop.addEventListener("click", event => {
          if (event.target === els.dialogBackdrop) closeDialog();
        });

        window.addEventListener("keydown", event => {
          const mod = event.ctrlKey || event.metaKey;

          if (state.dialogResolve) {
            if (event.key === "Escape") {
              event.preventDefault();
              closeDialog();
              return;
            }
            if (event.key === "Enter" && event.target.closest(".dialog")) {
              event.preventDefault();
              if (state.dialogSubmit) state.dialogSubmit();
              return;
            }
          }

          if (event.key === "Escape") {
            if (state.openNoteMenuId) {
              state.openNoteMenuId = null;
              renderBoard();
              return;
            }
            if (state.settingsOpen) {
              state.settingsOpen = false;
              renderHeader();
              return;
            }
            if (els.body.classList.contains("sidebar-open")) {
              closeMobileSidebar();
              return;
            }
          }

          if (!mod) return;
          const key = event.key.toLowerCase();

          if (key === "n") {
            event.preventDefault();
            createNote();
          }

          if (key === "/") {
            event.preventDefault();
            els.searchInput.focus();
            els.searchInput.select();
          }

          if (key === "s") {
            event.preventDefault();
            persistNow();
            showToast("Saved locally.");
          }
        });

        window.addEventListener("resize", () => {
          applyLayout();
          if (!isMobile()) closeMobileSidebar();
        });

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) persistNow();
        });

        window.addEventListener("beforeunload", persistNow);
      }

      loadState();

      try {
        document.execCommand("styleWithCSS", false, false);
        document.execCommand("defaultParagraphSeparator", false, "p");
      } catch {
        /* noop */
      }

      bindEvents();
      renderApp();
    })();
  </script>
</body>
</html>
