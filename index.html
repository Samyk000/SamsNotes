<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SamsNotes</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg-2: #efe4d4;
      --surface: rgba(255, 249, 241, 0.82);
      --surface-strong: #fffaf3;
      --surface-soft: #f3eadf;
      --surface-deep: #ede0cf;
      --text: #241c16;
      --text-soft: #6f5d50;
      --text-faint: #9d8979;
      --border: rgba(92, 71, 53, 0.11);
      --border-strong: rgba(92, 71, 53, 0.18);
      --accent: #8f6d54;
      --accent-strong: #735541;
      --accent-soft: rgba(143, 109, 84, 0.14);
      --danger: #bf675f;
      --danger-strong: #9f554f;
      --danger-soft: rgba(191, 103, 95, 0.12);
      --success: #6d876b;
      --shadow: 0 24px 70px rgba(79, 58, 42, 0.1);
      --shadow-soft: 0 12px 30px rgba(79, 58, 42, 0.07);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --blur: saturate(140%) blur(18px);
      --transition: 220ms cubic-bezier(.2,.8,.2,1);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --sidebar-width: 300px;
    }

    html[data-theme="dark"] {
      --bg: #030303;
      --bg-2: #090909;
      --surface: rgba(12, 12, 12, 0.92);
      --surface-strong: #121212;
      --surface-soft: #171717;
      --surface-deep: #1d1d1d;
      --text: #f7f1ea;
      --text-soft: #d1c3b5;
      --text-faint: #97897d;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --accent: #e1bc90;
      --accent-strong: #f0d1aa;
      --accent-soft: rgba(225, 188, 144, 0.16);
      --danger: #d27c74;
      --danger-strong: #b96860;
      --danger-soft: rgba(210, 124, 116, 0.14);
      --success: #90a67d;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      --shadow-soft: 0 16px 34px rgba(0, 0, 0, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(1200px 720px at 0% 0%, var(--accent-soft), transparent 54%),
        radial-gradient(1000px 720px at 100% 0%, rgba(109, 135, 107, 0.08), transparent 46%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
      transition:
        transform var(--transition),
        opacity var(--transition),
        background var(--transition),
        color var(--transition),
        border-color var(--transition),
        box-shadow var(--transition);
    }

    input, select {
      outline: none;
      border: 0;
      background: transparent;
    }

    ::selection {
      background: rgba(143, 109, 84, 0.2);
    }

    .shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      transition: grid-template-columns 280ms cubic-bezier(.2,.8,.2,1), gap 280ms cubic-bezier(.2,.8,.2,1);
    }

    body.sidebar-collapsed .app {
      --sidebar-width: 0px;
      gap: 0;
    }

    .sidebar {
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 40;
      transition: opacity var(--transition), transform var(--transition);
    }

    body.sidebar-collapsed .sidebar {
      opacity: 0;
      transform: translateX(-18px);
      pointer-events: none;
    }

    .sidebar-inner {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
      padding: 18px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 12px 28px rgba(143, 109, 84, 0.28);
    }

    .brand-title {
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
      min-width: 0;
    }

    .icon-btn,
    .soft-btn,
    .filter-btn,
    .collection-item,
    .collection-remove,
    .menu-item,
    .toolbar-btn,
    .select-wrap,
    .meta-btn,
    .view-badge {
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow-soft);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--text-soft);
      flex-shrink: 0;
    }

    .icon-btn:hover,
    .soft-btn:hover,
    .filter-btn:hover,
    .collection-item:hover,
    .collection-remove:hover,
    .toolbar-btn:hover,
    .meta-btn:hover,
    .note-card:hover,
    .menu-item:hover,
    .view-badge:hover {
      transform: translateY(-1px);
    }

    .icon-btn:active,
    .soft-btn:active,
    .filter-btn:active,
    .collection-item:active,
    .collection-remove:active,
    .toolbar-btn:active,
    .meta-btn:active,
    .note-card:active,
    .menu-item:active,
    .view-badge:active {
      transform: translateY(0);
    }

    .icon-btn.accent {
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(143, 109, 84, 0.24);
    }

    .soft-btn,
    .meta-btn {
      min-height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 14px;
      color: var(--text-soft);
    }

    .soft-btn.primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: transparent;
    }

    .soft-btn.danger,
    .menu-item.danger {
      color: var(--danger);
    }

    .danger-fill {
      background: linear-gradient(180deg, var(--danger), var(--danger-strong));
      border-color: transparent;
      color: #fff !important;
    }

    .sidebar-scroll {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
      margin-right: -4px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .sidebar-scroll::-webkit-scrollbar,
    .board-scroll::-webkit-scrollbar,
    .editor-scroll::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb,
    .board-scroll::-webkit-scrollbar-thumb,
    .editor-scroll::-webkit-scrollbar-thumb {
      background: rgba(130, 112, 96, 0.25);
      border: 2px solid transparent;
      background-clip: content-box;
      border-radius: 999px;
    }

    .filter-list,
    .collection-list {
      display: grid;
      gap: 8px;
    }

    .filter-btn,
    .collection-item {
      min-height: 46px;
      width: 100%;
      border-radius: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      text-align: left;
      color: var(--text-soft);
      min-width: 0;
    }

    .filter-btn.active,
    .collection-item.active,
    .toolbar-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
      box-shadow: none;
    }

    .filter-btn strong,
    .collection-count {
      margin-left: auto;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: inherit;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .section-title {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-soft);
      letter-spacing: -0.01em;
    }

    .collection-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .collection-item {
      padding-right: 12px;
    }

    .collection-remove {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: var(--text-faint);
      opacity: 0;
      pointer-events: none;
    }

    .collection-row:hover .collection-remove,
    .collection-row:focus-within .collection-remove {
      opacity: 1;
      pointer-events: auto;
    }

    .entity-icon,
    .chip-icon {
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
      color: var(--entity-color, var(--accent));
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
    }

    .entity-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
    }

    .chip-icon {
      width: 20px;
      height: 20px;
      border-radius: 8px;
    }

    .collection-label {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .header {
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto minmax(280px, 1fr) auto;
      gap: 16px;
      align-items: center;
      position: relative;
      z-index: 20;
    }

    .header-left,
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .header-search {
      position: relative;
      min-width: 0;
      width: 100%;
    }

    .header-search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }

    .header-search input {
      width: 100%;
      height: 48px;
      border-radius: 16px;
      padding: 0 16px 0 44px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      color: var(--text);
    }

    .header-search input::placeholder,
    .editor-title::placeholder {
      color: var(--text-faint);
    }

    .view-badge {
      min-height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      color: var(--text-soft);
      min-width: 0;
    }

    .view-badge strong {
      font-size: 0.92rem;
      color: var(--text);
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .view-badge span {
      font-size: 0.8rem;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .dropdown-wrap {
      position: relative;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: min(260px, 80vw);
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      padding: 8px;
      display: grid;
      gap: 6px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 60;
    }

    .dropdown.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .menu-item {
      min-height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      color: var(--text-soft);
      text-align: left;
    }

    .board {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .board-scroll {
      min-height: 0;
      overflow: auto;
      padding: 18px;
      height: 100%;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .note-card {
      position: relative;
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 14px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--surface-strong), var(--surface-soft));
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      outline: none;
      overflow: visible;
    }

    .note-card.active {
      border-color: var(--accent);
      box-shadow: 0 18px 36px var(--accent-soft);
    }

    .note-card.is-archived {
      opacity: 0.95;
    }

    .note-card.is-trashed {
      opacity: 0.82;
    }

    .note-card-head {
      display: flex;
      align-items: start;
      gap: 12px;
    }

    .note-title {
      margin: 0;
      padding-right: 34px;
      font-size: 1rem;
      line-height: 1.28;
      letter-spacing: -0.03em;
      max-height: 2.6em;
      overflow: hidden;
    }

    .note-menu-wrap {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 12;
    }

    .note-menu-trigger {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow-soft);
      color: var(--text-soft);
      opacity: 0;
      transform: translateY(4px);
    }

    .note-card:hover .note-menu-trigger,
    .note-card:focus-within .note-menu-trigger,
    .note-menu-trigger.open {
      opacity: 1;
      transform: translateY(0);
    }

    .card-menu {
      position: absolute;
      top: 44px;
      right: 0;
      width: 210px;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
    }

    .card-menu.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .note-preview {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.62;
      font-size: 0.93rem;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 4.9em;
    }

    .note-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip,
    .hint-chip {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: var(--text-soft);
      font-size: 0.78rem;
      white-space: nowrap;
      max-width: 100%;
    }

    .chip.status {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
    }

    .chip.status.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-faint);
      font-size: 0.79rem;
    }

    .empty-state {
      min-height: calc(100vh - 240px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .empty-card {
      max-width: 430px;
      padding: 28px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow-soft);
    }

    .empty-card h2 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: -0.04em;
    }

    .empty-card p {
      margin: 0 0 18px;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .editor-backdrop,
    .mobile-scrim,
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 8, 0.38);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      z-index: 70;
    }

    .editor-backdrop.show,
    .mobile-scrim.show,
    .dialog-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .editor-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      bottom: 16px;
      width: min(780px, calc(100vw - 32px));
      max-width: 100%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      transform: translateX(105%);
      transition: transform 240ms cubic-bezier(.2,.8,.2,1);
      z-index: 80;
      overflow: hidden;
    }

    .editor-panel.open {
      transform: translateX(0);
    }

    .editor-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, var(--surface), rgba(255,255,255,0));
    }

    .editor-head-top {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .editor-title {
      flex: 1;
      min-width: 0;
      font-size: clamp(1.1rem, 1vw + 1rem, 1.55rem);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.04em;
      padding: 6px 4px;
      color: var(--text);
    }

    .editor-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .select-wrap {
      min-height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      color: var(--text-soft);
      min-width: 0;
    }

    .select-wrap select {
      min-width: 0;
      appearance: none;
      color: inherit;
      background: transparent;
    }

    .select-wrap.small select {
      min-width: 68px;
    }

    .selected-tags {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .readonly-banner {
      min-height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid transparent;
      font-size: 0.9rem;
    }

    .hidden {
      display: none !important;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .toolbar::-webkit-scrollbar {
      height: 8px;
    }

    .toolbar::-webkit-scrollbar-thumb {
      background: rgba(130, 112, 96, 0.22);
      border-radius: 999px;
    }

    .toolbar-btn {
      min-width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      color: var(--text-soft);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    .editor-scroll {
      min-height: 0;
      overflow: auto;
    }

    .editor-body {
      min-height: 100%;
      padding: 28px 28px 56px;
      outline: none;
      color: var(--text);
      line-height: 1.74;
      font-size: 16px;
      caret-color: var(--accent);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .editor-body.is-empty::before {
      content: attr(data-placeholder);
      color: var(--text-faint);
      pointer-events: none;
    }

    .editor-body > *:first-child {
      margin-top: 0;
    }

    .editor-body > *:last-child {
      margin-bottom: 0;
    }

    .editor-body p,
    .editor-body div {
      margin: 0 0 1em;
    }

    .editor-body h1,
    .editor-body h2,
    .editor-body h3 {
      margin: 1.1em 0 0.55em;
      line-height: 1.14;
      letter-spacing: -0.04em;
    }

    .editor-body h1 { font-size: 1.8em; }
    .editor-body h2 { font-size: 1.45em; }
    .editor-body h3 { font-size: 1.18em; }

    .editor-body ul,
    .editor-body ol {
      margin: 0 0 1em 1.35em;
      padding: 0;
    }

    .editor-body li {
      margin: 0.35em 0;
    }

    .editor-body blockquote {
      margin: 1.1em 0;
      padding: 0.9em 1em 0.9em 1.1em;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 16px 16px 0;
      color: var(--text-soft);
    }

    .editor-body pre {
      margin: 1.1em 0;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
      line-height: 1.62;
    }

    .editor-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 0.14em 0.38em;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      font-size: 0.92em;
    }

    .editor-body pre code {
      border: 0;
      background: transparent;
      padding: 0;
    }

    .editor-body a {
      color: var(--accent);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 2px;
    }

    .editor-status {
      min-height: 54px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      color: var(--text-faint);
      font-size: 0.84rem;
    }

    .dialog-backdrop {
      z-index: 120;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .dialog {
      width: min(100%, 450px);
      border-radius: 26px;
      padding: 18px;
      transform: translateY(12px) scale(0.98);
      transition: transform var(--transition);
    }

    .dialog-backdrop.show .dialog {
      transform: translateY(0) scale(1);
    }

    .dialog-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .dialog-title {
      margin: 0;
      font-size: 1.14rem;
      letter-spacing: -0.03em;
    }

    .dialog-text {
      margin: 8px 0 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .dialog-body {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field span {
      font-size: 0.84rem;
      color: var(--text-soft);
    }

    .field input[type="text"] {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      padding: 0 14px;
      color: var(--text);
    }

    .icon-pick-grid,
    .pick-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .pick-icon,
    .pick-chip {
      min-height: 64px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      display: grid;
      place-items: center;
      color: var(--text-soft);
      padding: 8px;
    }

    .pick-chip {
      min-height: 42px;
      grid-template-columns: auto 1fr;
      place-items: center start;
      gap: 10px;
      padding: 0 14px;
      border-radius: 999px;
    }

    .pick-icon.active,
    .pick-chip.active {
      background: var(--accent-soft);
      border-color: transparent;
      color: var(--accent);
    }

    .pick-icon-badge {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--entity-color, var(--accent));
      background: var(--surface-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .dialog-error {
      min-height: 20px;
      color: var(--danger);
      font-size: 0.84rem;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      transform: translateY(16px);
      padding: 13px 16px;
      min-width: min(320px, 84vw);
      max-width: 92vw;
      border-radius: 16px;
      background: rgba(16, 16, 16, 0.94);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 22px 60px rgba(0,0,0,0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 140;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
      padding: 0;
    }

    svg.icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    @media (hover: none) {
      .note-menu-trigger,
      .collection-remove {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        padding: 10px;
        gap: 10px !important;
      }

      body.sidebar-collapsed .sidebar {
        opacity: 1;
        transform: translateX(-110%);
        pointer-events: none;
      }

      .sidebar {
        position: fixed;
        inset: 10px auto 10px 10px;
        width: min(88vw, 340px);
        max-height: calc(100dvh - 20px);
        transform: translateX(-110%);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      .header {
        grid-template-columns: auto 1fr auto;
        grid-template-areas:
          "left actions actions"
          "search search search";
        gap: 12px;
        padding: 14px;
      }

      .header-left { grid-area: left; }
      .header-actions {
        grid-area: actions;
        justify-content: flex-end;
      }
      .header-search { grid-area: search; }

      .board-scroll {
        padding: 14px;
      }

      .notes-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      }

      .editor-panel {
        inset: 0;
        width: 100%;
        border-radius: 0;
        transform: translateY(100%);
      }

      .editor-panel.open {
        transform: translateY(0);
      }

      .editor-body {
        padding: 22px 18px 44px;
      }
    }

    @media (max-width: 560px) {
      .icon-btn,
      .toolbar-btn {
        width: 40px;
        height: 40px;
        min-width: 40px;
        border-radius: 13px;
      }

      .soft-btn,
      .meta-btn,
      .select-wrap,
      .view-badge {
        min-height: 40px;
        border-radius: 13px;
      }

      .view-badge span {
        display: none;
      }

      .view-badge {
        padding: 0 12px;
      }

      .note-card {
        min-height: 205px;
      }

      .editor-status {
        padding: 0 14px;
        font-size: 0.8rem;
      }

      .dialog {
        padding: 16px;
      }

      .icon-pick-grid,
      .pick-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .toast {
        right: 12px;
        left: 12px;
        min-width: 0;
        max-width: none;
      }
    }
  </style>
</head>

  <div class="mobile-scrim" id="mobileScrim"></div>

  <div class="app">
    <aside class="sidebar shell" id="sidebar">
      <div class="sidebar-inner">
        <div class="brand-row">
          <div class="brand-mark">S</div>
          <h1 class="brand-title">SamsNotes</h1>
        </div>

            <div class="section-head">
              <h2 class="section-title">Folders</h2>
              <button class="icon-btn" id="addFolderBtn" aria-label="Add folder" title="Add folder">
                <svg class="icon"><use href="#i-plus"></use></svg>
              </button>
            </div>
            <div class="collection-list" id="foldersList"></div>
          </section>

          <section>
            <div class="section-head">
              <h2 class="section-title">Tags</h2>
              <button class="icon-btn" id="addTagBtn" aria-label="Add tag" title="Add tag">
                <svg class="icon"><use href="#i-plus"></use></svg>
              </button>
            </div>
            <div class="collection-list" id="tagsList"></div>
          </section>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="header shell">
        <div class="header-left">
          <button class="icon-btn" id="sidebarToggleBtn" aria-label="Toggle sidebar" title="Toggle sidebar">
            <svg class="icon"><use href="#i-menu"></use></svg>
          </button>
        </div>

        <label class="header-search" aria-label="Search notes">
          <svg class="icon"><use href="#i-search"></use></svg>
          <input id="searchInput" type="search" placeholder="Search notes" inputmode="search" autocomplete="off" />
        </label>

        <div class="header-actions">
          <div class="view-badge" title="Current view">
            <strong id="viewTitle">All notes</strong>
            <span id="viewMeta">0 notes</span>
          </div>

          <button class="icon-btn accent" id="newNoteBtn" aria-label="New note" title="New note">
            <svg class="icon"><use href="#i-plus"></use></svg>
          </button>

          <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Toggle theme">
            <svg class="icon"><use href="#i-moon"></use></svg>
          </button>

          <div class="dropdown-wrap" id="settingsWrap">
            <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings" aria-haspopup="menu" aria-expanded="false">
              <svg class="icon"><use href="#i-settings"></use></svg>
            </button>
            <div class="dropdown" id="settingsMenu" role="menu" aria-label="Settings menu">
              <button class="menu-item" data-settings-action="import" role="menuitem">
                <svg class="icon"><use href="#i-upload"></use></svg>
                <span>Import</span>
              </button>
              <button class="menu-item" data-settings-action="export" role="menuitem">
                <svg class="icon"><use href="#i-download"></use></svg>
                <span>Export all</span>
              </button>
              <button class="menu-item danger" data-settings-action="delete-all" role="menuitem">
                <svg class="icon"><use href="#i-trash"></use></svg>
                <span>Delete all notes</span>
              </button>
            </div>
          </div>
        </div>

      <section class="board shell">

          <div class="notes-grid" id="notesGrid"></div>
        </div>
      </section>
    </main>

  <div class="editor-backdrop" id="editorBackdrop"></div>

    <div class="editor-head">
      <div class="editor-head-top">
        <button class="icon-btn" id="editorCloseBtn" aria-label="Close editor" title="Close editor">
          <svg class="icon"><use href="#i-close"></use></svg>
        </button>
        <input id="editorTitleInput" class="editor-title" type="text" maxlength="160" placeholder="Untitled note" />
      </div>

      <div class="editor-controls">
        <label class="select-wrap" title="Folder">
          <svg class="icon"><use href="#i-folder"></use></svg>
          <select id="folderSelect" aria-label="Folder"></select>
        </label>

        <button class="meta-btn" id="tagPickerBtn" title="Tags">
          <svg class="icon"><use href="#i-tag"></use></svg>
          <span>Tags</span>
        </button>

        <div class="selected-tags" id="selectedTags"></div>

        <div style="flex:1"></div>

        <label class="select-wrap small" title="Font size">

            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="24">24</option>
            <option value="28">28</option>
            <option value="32">32</option>
          </select>
        </label>
      </div>

      <div class="readonly-banner hidden" id="readonlyBanner">
        <svg class="icon"><use href="#i-trash"></use></svg>
        <span>This note is in trash. Restore it from the card menu to edit.</span>
      </div>
    </div>

    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn" data-block="H1" title="Heading 1"><svg class="icon"><use href="#i-h1"></use></svg></button>
      <button class="toolbar-btn" data-block="H2" title="Heading 2"><svg class="icon"><use href="#i-h2"></use></svg></button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" data-cmd="bold" title="Bold"><svg class="icon"><use href="#i-bold"></use></svg></button>
      <button class="toolbar-btn" data-cmd="italic" title="Italic"><svg class="icon"><use href="#i-italic"></use></svg></button>
      <button class="toolbar-btn" data-cmd="underline" title="Underline"><svg class="icon"><use href="#i-underline"></use></svg></button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Bulleted list"><svg class="icon"><use href="#i-list"></use></svg></button>
      <button class="toolbar-btn" data-cmd="insertOrderedList" title="Numbered list"><svg class="icon"><use href="#i-list-ordered"></use></svg></button>
      <button class="toolbar-btn" data-block="BLOCKQUOTE" title="Quote"><svg class="icon"><use href="#i-quote"></use></svg></button>
      <button class="toolbar-btn" data-block="PRE" title="Code block"><svg class="icon"><use href="#i-code"></use></svg></button>
      <button class="toolbar-btn" data-action="link" title="Link"><svg class="icon"><use href="#i-link"></use></svg></button>
      <button class="toolbar-btn" data-action="clear" title="Clear formatting"><svg class="icon"><use href="#i-erase"></use></svg></button>
    </div>

    <div class="editor-scroll">
      <div id="editorBody" class="editor-body is-empty" contenteditable="true" spellcheck="true" data-placeholder="Start writing…"></div>
    </div>

    <div class="editor-status">
      <div id="editorMeta">0 words · 0 chars</div>
      <div id="saveLabel">Saved locally</div>
    </div>
  </aside>

  <div class="dialog-backdrop" id="dialogBackdrop" aria-hidden="true">
    <div class="dialog shell" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog-head">
        <div>
          <h3 class="dialog-title" id="dialogTitle"></h3>
          <p class="dialog-text" id="dialogText"></p>
        </div>
        <button class="icon-btn" id="dialogCloseBtn" aria-label="Close dialog" title="Close dialog">
          <svg class="icon"><use href="#i-close"></use></svg>
        </button>
      </div>
      <div class="dialog-body" id="dialogBody"></div>
      <div class="dialog-actions">
        <button class="soft-btn" id="dialogCancelBtn">Cancel</button>
        <button class="soft-btn primary" id="dialogConfirmBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input id="importInput" class="hidden" type="file" accept=".json,application/json" />

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "samsnotes_v3_singlefile";
      const LEGACY_KEY = "samsnotes_v2_singlefile";
      const FONT_SIZES = [12, 14, 16, 18, 20, 24, 28, 32];

      const ENTITY_ICONS = [
        { key: "briefcase", label: "Briefcase", symbol: "#i-briefcase", color: "#d07f71" },
        { key: "book", label: "Book", symbol: "#i-book", color: "#7d90d6" },
        { key: "star", label: "Star", symbol: "#i-star", color: "#d8b059" },
        { key: "leaf", label: "Leaf", symbol: "#i-leaf", color: "#78a987" },
        { key: "home", label: "Home", symbol: "#i-home", color: "#7f8b9e" },
        { key: "heart", label: "Heart", symbol: "#i-heart", color: "#d37a90" },
        { key: "bulb", label: "Bulb", symbol: "#i-bulb", color: "#c79b5a" },
        { key: "bookmark", label: "Bookmark", symbol: "#i-bookmark", color: "#8a7fd8" },
        { key: "compass", label: "Compass", symbol: "#i-compass", color: "#5b9db0" },
        { key: "camera", label: "Camera", symbol: "#i-camera", color: "#b47eae" }
      ];

      const els = {
        html: document.documentElement,
        body: document.body,
        mobileScrim: document.getElementById("mobileScrim"),
        sidebarToggleBtn: document.getElementById("sidebarToggleBtn"),
        systemFilters: document.getElementById("systemFilters"),
        foldersList: document.getElementById("foldersList"),
        tagsList: document.getElementById("tagsList"),
        addFolderBtn: document.getElementById("addFolderBtn"),
        addTagBtn: document.getElementById("addTagBtn"),
        viewTitle: document.getElementById("viewTitle"),
        viewMeta: document.getElementById("viewMeta"),
        searchInput: document.getElementById("searchInput"),
        newNoteBtn: document.getElementById("newNoteBtn"),
        themeBtn: document.getElementById("themeBtn"),
        settingsWrap: document.getElementById("settingsWrap"),
        settingsBtn: document.getElementById("settingsBtn"),
        settingsMenu: document.getElementById("settingsMenu"),
        notesGrid: document.getElementById("notesGrid"),
        editorBackdrop: document.getElementById("editorBackdrop"),
        editorPanel: document.getElementById("editorPanel"),
        editorCloseBtn: document.getElementById("editorCloseBtn"),
        editorTitleInput: document.getElementById("editorTitleInput"),
        folderSelect: document.getElementById("folderSelect"),
        tagPickerBtn: document.getElementById("tagPickerBtn"),
        selectedTags: document.getElementById("selectedTags"),
        fontSizeSelect: document.getElementById("fontSizeSelect"),
        readonlyBanner: document.getElementById("readonlyBanner"),
        toolbar: document.getElementById("toolbar"),
        editorBody: document.getElementById("editorBody"),
        editorMeta: document.getElementById("editorMeta"),
        saveLabel: document.getElementById("saveLabel"),
        dialogBackdrop: document.getElementById("dialogBackdrop"),
        dialogTitle: document.getElementById("dialogTitle"),
        dialogText: document.getElementById("dialogText"),
        dialogBody: document.getElementById("dialogBody"),
        dialogCloseBtn: document.getElementById("dialogCloseBtn"),
        dialogCancelBtn: document.getElementById("dialogCancelBtn"),
        dialogConfirmBtn: document.getElementById("dialogConfirmBtn"),
        toast: document.getElementById("toast"),
        importInput: document.getElementById("importInput")
      };

      const state = {
        theme: "light",
        sidebarCollapsed: false,
        view: { kind: "system", id: "all" },
        query: "",
        notes: [],
        folders: [],
        tags: [],
        activeNoteId: null,
        editorOpen: false,
        settingsOpen: false,
        openNoteMenuId: null,
        saveTimer: null,
        persistHandle: null,
        toastTimer: null,
        boardTimer: null,
        editorSyncTimer: null,
        syncingEditor: false,
        renderedNoteId: null,
        saveMessage: "Saved locally",
        dialogResolve: null,
        dialogSubmit: null,
        dialogBodyClick: null,
        savedSelection: null
      };

      function uid() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return "id_" + Date.now() + "_" + Math.random().toString(16).slice(2);
      }

      function now() {
        return Date.now();
      }

      function isMobile() {
        return window.innerWidth <= 980;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeSpace(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function clampFontSize(value) {
        const num = Number(value);
        return FONT_SIZES.includes(num) ? num : 16;
      }

      function sanitizeUrl(url) {
        const raw = String(url || "").trim();
        if (!raw) return "";
        if (/^(https?:|mailto:|tel:|#|\/)/i.test(raw)) return raw;
        return "https://" + raw;
      }

      function getEntityIcon(key) {
        return ENTITY_ICONS.find(item => item.key === key) || ENTITY_ICONS[0];
      }

      function unwrapNode(node) {
        const parent = node.parentNode;
        if (!parent) return;
        while (node.firstChild) parent.insertBefore(node.firstChild, node);
        parent.removeChild(node);
      }

      function sanitizeHTML(html) {
        const allowed = new Set([
          "p", "br", "div",
          "h1", "h2", "h3",
          "ul", "ol", "li",
          "strong", "b", "em", "i", "u", "s",
          "blockquote", "pre", "code",
          "a", "span"
        ]);

        const template = document.createElement("template");
        template.innerHTML = String(html || "");

        const nodes = Array.from(template.content.querySelectorAll("*")).reverse();
        for (const node of nodes) {
          const tag = node.tagName.toLowerCase();
          if (!allowed.has(tag)) {
            unwrapNode(node);
            continue;
          }

          for (const attr of Array.from(node.attributes)) {
            const name = attr.name.toLowerCase();
            const value = attr.value;

            if (name.startsWith("on")) {
              node.removeAttribute(attr.name);
              continue;
            }

            if (tag === "a" && name === "href") {
              const href = sanitizeUrl(value);
              if (href) {
                node.setAttribute("href", href);
                node.setAttribute("target", "_blank");
                node.setAttribute("rel", "noopener noreferrer");
              } else {
                node.removeAttribute("href");
              }
              continue;
            }

            if (tag === "a" && (name === "target" || name === "rel")) {
              continue;
            }

            node.removeAttribute(attr.name);
          }
        }

        return template.innerHTML.trim();
      }

      function extractText(html) {
        const div = document.createElement("div");
        div.innerHTML = String(html || "");
        return div.textContent.replace(/\u00A0/g, " ").replace(/\r/g, "").trim();
      }

      function deriveMeta(title, textValue) {
        const text = String(textValue || "").replace(/\u00A0/g, " ").replace(/\r/g, "").trim();
        const autoTitle = normalizeSpace(text.split("\n").find(Boolean) || text).slice(0, 160);

        let previewBase = text;
        const cleanTitle = normalizeSpace(title);
        if (cleanTitle && previewBase.toLowerCase().startsWith(cleanTitle.toLowerCase())) {
          previewBase = previewBase.slice(cleanTitle.length).trim();
        } else if (!cleanTitle && autoTitle) {
          previewBase = previewBase.slice(autoTitle.length).trim();
        }

        const previewText = normalizeSpace(previewBase).slice(0, 320) || "No content yet.";
        const words = text ? (text.match(/\S+/g) || []).length : 0;
        const chars = text.length;

        return {
          text,
          autoTitle,
          previewText,
          metaWords: words,
          metaChars: chars
        };
      }

      function readingMinutes(words) {
        return words ? Math.max(1, Math.ceil(words / 200)) : 0;
      }

      function formatRelativeTime(ts) {
        const diff = Math.max(1, Date.now() - Number(ts || 0));
        const sec = Math.floor(diff / 1000);
        if (sec < 60) return "just now";
        const min = Math.floor(sec / 60);
        if (min < 60) return min + "m ago";
        const hrs = Math.floor(min / 60);
        if (hrs < 24) return hrs + "h ago";
        const days = Math.floor(hrs / 24);
        if (days < 7) return days + "d ago";
        return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric" }).format(new Date(ts));
      }

      function downloadFile(filename, content, type) {
        const blob = content instanceof Blob ? content : new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      }

      function updateSaveMessage(message) {
        state.saveMessage = message;
        els.saveLabel.textContent = message;
      }

      function showToast(message) {
        clearTimeout(state.toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        state.toastTimer = setTimeout(() => {
          els.toast.classList.remove("show");
        }, 2200);
      }

      function normalizeFolder(raw) {
        const icon = getEntityIcon(raw?.iconKey || "briefcase");
        return {
          id: typeof raw?.id === "string" && raw.id ? raw.id : uid(),
          title: normalizeSpace(raw?.title).slice(0, 40),
          iconKey: icon.key,
          color: icon.color,
          createdAt: Number(raw?.createdAt) || now()
        };
      }

      function normalizeTag(raw) {
        const icon = getEntityIcon(raw?.iconKey || "star");
        return {
          id: typeof raw?.id === "string" && raw.id ? raw.id : uid(),
          title: normalizeSpace(raw?.title).slice(0, 40),
          iconKey: icon.key,
          color: icon.color,
          createdAt: Number(raw?.createdAt) || now()
        };
      }

      function normalizeNote(raw) {
        const content = sanitizeHTML(raw?.content || "");
        const meta = deriveMeta(raw?.title || "", extractText(content));

        return {
          id: typeof raw?.id === "string" && raw.id ? raw.id : uid(),
          title: String(raw?.title || "").slice(0, 160),
          content,
          pinned: Boolean(raw?.pinned),
          archived: Boolean(raw?.archived),
          trashed: Boolean(raw?.trashed),
          folderId: typeof raw?.folderId === "string" && raw.folderId ? raw.folderId : null,
          tags: Array.isArray(raw?.tags) ? [...new Set(raw.tags.filter(id => typeof id === "string"))] : [],
          fontSize: clampFontSize(raw?.fontSize),
          createdAt: Number(raw?.createdAt) || now(),
          updatedAt: Number(raw?.updatedAt) || now(),
          ...meta
        };
      }

      function cleanupReferences() {
        const folderIds = new Set(state.folders.map(folder => folder.id));
        const tagIds = new Set(state.tags.map(tag => tag.id));

        for (const note of state.notes) {
          if (note.folderId && !folderIds.has(note.folderId)) note.folderId = null;
          note.tags = note.tags.filter(tagId => tagIds.has(tagId));
        }

        if (state.view.kind === "folder" && !folderIds.has(state.view.id)) {
          state.view = { kind: "system", id: "all" };
        }

        if (state.view.kind === "tag" && !tagIds.has(state.view.id)) {
          state.view = { kind: "system", id: "all" };
        }

        if (state.activeNoteId && !state.notes.some(note => note.id === state.activeNoteId)) {
          state.activeNoteId = null;
          state.editorOpen = false;
          state.renderedNoteId = null;
        }
      }

      function getFolder(id) {
        return state.folders.find(folder => folder.id === id) || null;
      }

      function getTag(id) {
        return state.tags.find(tag => tag.id === id) || null;
      }

      function getNote(id = state.activeNoteId) {
        return state.notes.find(note => note.id === id) || null;
      }

      function getNoteTitle(note) {
        return normalizeSpace(note?.title) || note?.autoTitle || "Untitled note";
      }

      function getSearchHaystack(note) {
        const folderName = getFolder(note.folderId)?.title || "";
        const tagNames = note.tags.map(tagId => getTag(tagId)?.title || "").join(" ");
        return [note.title, note.text, folderName, tagNames].join(" ").toLowerCase();
      }

      function matchesView(note) {
        if (state.view.kind === "system") {
          if (state.view.id === "all") return !note.trashed && !note.archived;
          if (state.view.id === "pinned") return !note.trashed && !note.archived && note.pinned;
          if (state.view.id === "archived") return !note.trashed && note.archived;
          if (state.view.id === "trash") return note.trashed;
        }

        if (state.view.kind === "folder") {
          return !note.trashed && note.folderId === state.view.id;
        }

        if (state.view.kind === "tag") {
          return !note.trashed && note.tags.includes(state.view.id);
        }

        return true;
      }

      function sortNotes(notes) {
        const canPinSort = !(state.view.kind === "system" && (state.view.id === "archived" || state.view.id === "trash"));
        return [...notes].sort((a, b) => {
          if (canPinSort && a.pinned !== b.pinned) return a.pinned ? -1 : 1;
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        });
      }

      function getVisibleNotes() {
        const query = state.query.trim().toLowerCase();
        let notes = state.notes.filter(matchesView);
        if (query) notes = notes.filter(note => getSearchHaystack(note).includes(query));
        return sortNotes(notes);
      }

      function systemCount(id) {
        return state.notes.filter(note => {
          if (id === "all") return !note.trashed && !note.archived;
          if (id === "pinned") return !note.trashed && !note.archived && note.pinned;
          if (id === "archived") return !note.trashed && note.archived;
          if (id === "trash") return note.trashed;
          return false;
        }).length;
      }

      function folderCount(folderId) {
        return state.notes.filter(note => !note.trashed && note.folderId === folderId).length;
      }

      function tagCount(tagId) {
        return state.notes.filter(note => !note.trashed && note.tags.includes(tagId)).length;
      }

      function getViewLabel() {
        if (state.view.kind === "system") {
          if (state.view.id === "all") return "All notes";
          if (state.view.id === "pinned") return "Pinned";
          if (state.view.id === "archived") return "Archived";
          if (state.view.id === "trash") return "Trash";
        }

        if (state.view.kind === "folder") return getFolder(state.view.id)?.title || "Folder";
        if (state.view.kind === "tag") return "#" + (getTag(state.view.id)?.title || "Tag");
        return "Notes";
      }

      function getViewMetaText() {
        const count = getVisibleNotes().length;
        if (state.query.trim()) return count + " match" + (count === 1 ? "" : "es");
        return count + " note" + (count === 1 ? "" : "s");
      }

      function applyLayout() {
        els.body.classList.toggle("sidebar-collapsed", !isMobile() && state.sidebarCollapsed);
        if (!isMobile()) closeMobileSidebar();
      }

      function renderTheme() {
        els.html.setAttribute("data-theme", state.theme);
        els.themeBtn.innerHTML = state.theme === "dark"
          ? '<svg class="icon"><use href="#i-sun"></use></svg>'
          : '<svg class="icon"><use href="#i-moon"></use></svg>';
      }

      function renderEntityIcon(item, className = "entity-icon") {
        const icon = getEntityIcon(item.iconKey);
        return `
          <span class="${className}" style="--entity-color:${icon.color}">
            <svg class="icon" style="width:14px;height:14px"><use href="${icon.symbol}"></use></svg>
          </span>
        `;
      }

      function renderEntityChip(item, prefix = "") {
        return `
          <span class="chip">
            ${renderEntityIcon(item, "chip-icon")}
            <span>${escapeHtml(prefix + item.title)}</span>
          </span>
        `;
      }

      function renderSidebar() {
        const filters = [
          { id: "all", label: "All", count: systemCount("all") },
          { id: "pinned", label: "Pinned", count: systemCount("pinned") },
          { id: "archived", label: "Archived", count: systemCount("archived") },
          { id: "trash", label: "Trash", count: systemCount("trash") }
        ];

        els.systemFilters.innerHTML = filters.map(item => {
          const active = state.view.kind === "system" && state.view.id === item.id ? "active" : "";
          return `
            <button class="filter-btn ${active}" data-view-kind="system" data-view-id="${item.id}">
              <span>${escapeHtml(item.label)}</span>
              <strong>${item.count}</strong>
            </button>
          `;
        }).join("");

        const sortedFolders = [...state.folders].sort((a, b) => a.title.localeCompare(b.title));
        els.foldersList.innerHTML = sortedFolders.length
          ? sortedFolders.map(folder => {
              const active = state.view.kind === "folder" && state.view.id === folder.id ? "active" : "";
              return `
                <div class="collection-row">
                  <button class="collection-item ${active}" data-view-kind="folder" data-view-id="${folder.id}">
                    ${renderEntityIcon(folder)}
                    <span class="collection-label">${escapeHtml(folder.title)}</span>
                    <span class="collection-count">${folderCount(folder.id)}</span>
                  </button>
                  <button class="collection-remove" data-remove-kind="folder" data-remove-id="${folder.id}" aria-label="Delete folder ${escapeHtml(folder.title)}" title="Delete folder">
                    <svg class="icon"><use href="#i-trash"></use></svg>
                  </button>
                </div>
              `;
            }).join("")
          : `<div class="hint-chip">No folders yet</div>`;

        const sortedTags = [...state.tags].sort((a, b) => a.title.localeCompare(b.title));
        els.tagsList.innerHTML = sortedTags.length
          ? sortedTags.map(tag => {
              const active = state.view.kind === "tag" && state.view.id === tag.id ? "active" : "";
              return `
                <div class="collection-row">
                  <button class="collection-item ${active}" data-view-kind="tag" data-view-id="${tag.id}">
                    ${renderEntityIcon(tag)}
                    <span class="collection-label">#${escapeHtml(tag.title)}</span>
                    <span class="collection-count">${tagCount(tag.id)}</span>
                  </button>
                  <button class="collection-remove" data-remove-kind="tag" data-remove-id="${tag.id}" aria-label="Delete tag ${escapeHtml(tag.title)}" title="Delete tag">
                    <svg class="icon"><use href="#i-trash"></use></svg>
                  </button>
                </div>
              `;
            }).join("")
          : `<div class="hint-chip">No tags yet</div>`;
      }

      function renderHeader() {
        els.viewTitle.textContent = getViewLabel();
        els.viewMeta.textContent = getViewMetaText();
        if (els.searchInput.value !== state.query) els.searchInput.value = state.query;
        els.settingsMenu.classList.toggle("show", state.settingsOpen);
        els.settingsBtn.setAttribute("aria-expanded", state.settingsOpen ? "true" : "false");
      }

      function cardMenuMarkup(note) {
        if (note.trashed) {
          return `
            <div class="card-menu ${state.openNoteMenuId === note.id ? "show" : ""}">
              <button class="menu-item" data-note-action="restore" data-note-id="${note.id}">
                <svg class="icon"><use href="#i-restore"></use></svg>
                <span>Restore</span>
              </button>
              <button class="menu-item danger" data-note-action="delete" data-note-id="${note.id}">
                <svg class="icon"><use href="#i-trash"></use></svg>
                <span>Delete forever</span>
              </button>
            </div>
          `;
        }

        const pinItem = !note.archived ? `
          <button class="menu-item" data-note-action="pin" data-note-id="${note.id}">
            <svg class="icon"><use href="#i-pin"></use></svg>
            <span>${note.pinned ? "Unpin" : "Pin"}</span>
          </button>
        ` : "";

        return `
          <div class="card-menu ${state.openNoteMenuId === note.id ? "show" : ""}">
            ${pinItem}
            <button class="menu-item" data-note-action="archive" data-note-id="${note.id}">
              <svg class="icon"><use href="#i-archive"></use></svg>
              <span>${note.archived ? "Remove from archive" : "Archive"}</span>
            </button>
            <button class="menu-item" data-note-action="duplicate" data-note-id="${note.id}">
              <svg class="icon"><use href="#i-copy"></use></svg>
              <span>Duplicate</span>
            </button>
            <button class="menu-item" data-note-action="export" data-note-id="${note.id}">
              <svg class="icon"><use href="#i-download"></use></svg>
              <span>Export</span>
            </button>
            <button class="menu-item danger" data-note-action="trash" data-note-id="${note.id}">
              <svg class="icon"><use href="#i-trash"></use></svg>
              <span>Move to trash</span>
            </button>
          </div>
        `;
      }

      function renderBoard() {
        const notes = getVisibleNotes();

        if (!notes.length) {
          const title = state.query.trim()
            ? "No notes match your search"
            : state.view.kind === "system" && state.view.id === "trash"
              ? "Trash is empty"
              : "No notes here yet";

          const text = state.query.trim()
            ? "Try a different word or clear the search."
            : state.view.kind === "system" && state.view.id === "trash"
              ? "Deleted notes will appear here until you remove them forever."
              : "Create a note to start writing.";

          const actions = state.query.trim()
            ? `
              <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
                <button class="soft-btn" data-empty-action="clear-search">Clear search</button>
                <button class="soft-btn primary" data-empty-action="create">New note</button>
              </div>
            `
            : state.view.kind === "system" && state.view.id === "trash"
              ? ""
              : `<button class="soft-btn primary" data-empty-action="create">New note</button>`;

          els.notesGrid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-card">
                <h2>${escapeHtml(title)}</h2>
                <p>${escapeHtml(text)}</p>
                ${actions}
              </div>
            </div>
          `;
          return;
        }

        els.notesGrid.innerHTML = notes.map(note => {
          const folder = getFolder(note.folderId);
          const tags = note.tags.map(tagId => getTag(tagId)).filter(Boolean);
          const chips = [];

          if (folder) chips.push(renderEntityChip(folder));
          for (const tag of tags.slice(0, 2)) chips.push(renderEntityChip(tag, "#"));
          if (tags.length > 2) chips.push(`<span class="chip">+${tags.length - 2} more</span>`);

          if (note.pinned && !note.trashed && !note.archived) {
            chips.push(`
              <span class="chip status">
                <svg class="icon" style="width:14px;height:14px"><use href="#i-pin"></use></svg>
                <span>Pinned</span>
              </span>
            `);
          }

          if (note.archived && !note.trashed) {
            chips.push(`
              <span class="chip status">
                <svg class="icon" style="width:14px;height:14px"><use href="#i-archive"></use></svg>
                <span>Archived</span>
              </span>
            `);
          }

          if (note.trashed) {
            chips.push(`
              <span class="chip status danger">
                <svg class="icon" style="width:14px;height:14px"><use href="#i-trash"></use></svg>
                <span>Trash</span>
              </span>
            `);
          }

          return `
            <article
              class="note-card ${state.editorOpen && state.activeNoteId === note.id ? "active" : ""} ${note.archived ? "is-archived" : ""} ${note.trashed ? "is-trashed" : ""}"
              data-note-card="${note.id}"
              tabindex="0"
              role="button"
              aria-label="Open note ${escapeHtml(getNoteTitle(note))}">
              <div class="note-menu-wrap">
                <button class="note-menu-trigger ${state.openNoteMenuId === note.id ? "open" : ""}" data-note-menu="${note.id}" aria-label="Note options" title="Note options" aria-haspopup="menu" aria-expanded="${state.openNoteMenuId === note.id ? "true" : "false"}">
                  <svg class="icon"><use href="#i-more"></use></svg>
                </button>
                ${cardMenuMarkup(note)}
              </div>

              <div class="note-card-head">
                <h2 class="note-title">${escapeHtml(getNoteTitle(note))}</h2>
              </div>

              <p class="note-preview">${escapeHtml(note.previewText || "No content yet.")}</p>

              <div class="note-chips">${chips.join("")}</div>

              <div class="note-footer">
                <span>${escapeHtml(formatRelativeTime(note.updatedAt))}</span>
                <span>${note.metaWords || 0} words</span>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderFolderSelect(selectedId) {
        els.folderSelect.innerHTML = `
          <option value="">No folder</option>
          ${[...state.folders].sort((a, b) => a.title.localeCompare(b.title)).map(folder => `
            <option value="${folder.id}" ${selectedId === folder.id ? "selected" : ""}>${escapeHtml(folder.title)}</option>
          `).join("")}
        `;
      }

      function renderSelectedTags(tagIds) {
        const tags = tagIds.map(id => getTag(id)).filter(Boolean);
        els.selectedTags.innerHTML = tags.length
          ? tags.map(tag => renderEntityChip(tag, "#")).join("")
          : `<span class="hint-chip">No tags</span>`;
      }

      function syncEditorPlaceholder() {
        const text = normalizeSpace(els.editorBody.textContent || "");
        els.editorBody.classList.toggle("is-empty", !text);
      }

      function renderEditorStatus() {
        const note = getNote();
        if (!note) {
          els.editorMeta.textContent = "0 words · 0 chars";
          els.saveLabel.textContent = state.saveMessage;
          return;
        }

        const parts = [
          `${note.metaWords || 0} word${(note.metaWords || 0) === 1 ? "" : "s"}`,
          `${note.metaChars || 0} char${(note.metaChars || 0) === 1 ? "" : "s"}`
        ];

        const minutes = readingMinutes(note.metaWords || 0);
        if (minutes) parts.push(`${minutes} min read`);
        parts.push(`edited ${formatRelativeTime(note.updatedAt)}`);

        els.editorMeta.textContent = parts.join(" · ");
        els.saveLabel.textContent = state.saveMessage;
      }

      function renderToolbarState() {
        const note = getNote();
        const readOnly = !note || note.trashed;

        for (const btn of Array.from(els.toolbar.querySelectorAll(".toolbar-btn"))) {
          btn.disabled = readOnly;
          btn.classList.remove("active");
        }

        if (readOnly) return;

        try {
          const selection = window.getSelection();
          const anchor = selection && selection.rangeCount ? selection.anchorNode : null;
          const insideEditor = anchor && els.editorBody.contains(anchor);
          if (!insideEditor) return;

          const map = [
            ["bold", "bold"],
            ["italic", "italic"],
            ["underline", "underline"],
            ["insertUnorderedList", "insertUnorderedList"],
            ["insertOrderedList", "insertOrderedList"]
          ];

          for (const [selector, command] of map) {
            const btn = els.toolbar.querySelector(`[data-cmd="${selector}"]`);
            if (btn && document.queryCommandState(command)) btn.classList.add("active");
          }

          let node = anchor.nodeType === 3 ? anchor.parentElement : anchor;
          const block = node && node.closest ? node.closest("h1,h2,blockquote,pre") : null;
          if (block) {
            const btn = els.toolbar.querySelector(`[data-block="${block.tagName.toUpperCase()}"]`);
            if (btn) btn.classList.add("active");
          }
        } catch {
          /* noop */
        }
      }

      function renderEditorPanel() {
        const note = getNote();
        const shouldOpen = state.editorOpen && note;

        els.editorPanel.classList.toggle("open", Boolean(shouldOpen));
        els.editorBackdrop.classList.toggle("show", Boolean(shouldOpen));
        els.editorPanel.setAttribute("aria-hidden", shouldOpen ? "false" : "true");

        if (!shouldOpen) {
          state.renderedNoteId = null;
          return;
        }

        const readOnly = note.trashed;
        state.syncingEditor = true;

        if (state.renderedNoteId !== note.id) {
          els.editorTitleInput.value = note.title;
          els.editorBody.innerHTML = note.content || "";
          state.renderedNoteId = note.id;
        }

        els.editorBody.style.fontSize = note.fontSize + "px";
        els.fontSizeSelect.value = String(note.fontSize);
        renderFolderSelect(note.folderId);
        renderSelectedTags(note.tags);
        syncEditorPlaceholder();

        els.readonlyBanner.classList.toggle("hidden", !readOnly);
        els.editorTitleInput.disabled = readOnly;
        els.folderSelect.disabled = readOnly;
        els.tagPickerBtn.disabled = readOnly;
        els.fontSizeSelect.disabled = readOnly;
        els.editorBody.setAttribute("contenteditable", readOnly ? "false" : "true");

        renderEditorStatus();
        renderToolbarState();
        state.syncingEditor = false;
      }

      function renderApp() {
        applyLayout();
        renderTheme();
        renderSidebar();
        renderHeader();
        renderBoard();
        renderEditorPanel();
      }

      function openMobileSidebar() {
        if (!isMobile()) return;
        els.body.classList.add("sidebar-open");
        els.mobileScrim.classList.add("show");
      }

      function closeMobileSidebar() {
        els.body.classList.remove("sidebar-open");
        els.mobileScrim.classList.remove("show");
      }

      function toggleSidebar() {
        state.settingsOpen = false;
        state.openNoteMenuId = null;

        if (isMobile()) {
          if (els.body.classList.contains("sidebar-open")) closeMobileSidebar();
          else openMobileSidebar();
          renderHeader();
          renderBoard();
          return;
        }

        state.sidebarCollapsed = !state.sidebarCollapsed;
        applyLayout();
        schedulePersist();
      }

      function saveSelection() {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) {
          state.savedSelection = null;
          return;
        }
        const range = selection.getRangeAt(0);
        if (els.editorBody.contains(range.commonAncestorContainer)) {
          state.savedSelection = range.cloneRange();
        }
      }

      function restoreSelection() {
        if (!state.savedSelection) return;
        const selection = window.getSelection();
        if (!selection) return;
        selection.removeAllRanges();
        selection.addRange(state.savedSelection);
      }

      function cancelPersistWork() {
        clearTimeout(state.saveTimer);
        if (state.persistHandle != null) {
          if ("cancelIdleCallback" in window) window.cancelIdleCallback(state.persistHandle);
          else clearTimeout(state.persistHandle);
          state.persistHandle = null;
        }
      }

      function processActiveNoteFromEditor({ sanitize = false, syncDOM = false } = {}) {
        const note = getNote();
        if (!note || !state.editorOpen || note.trashed) return;

        note.title = els.editorTitleInput.value.slice(0, 160);

        let html = els.editorBody.innerHTML;
        if (sanitize) {
          const cleanHtml = sanitizeHTML(html);
          if (syncDOM && cleanHtml !== html) {
            els.editorBody.innerHTML = cleanHtml;
          }
          html = cleanHtml;
        }

        note.content = html;

        const textSource = sanitize ? extractText(html) : (els.editorBody.textContent || "");
        Object.assign(note, deriveMeta(note.title, textSource));
        note.updatedAt = now();
      }

      function persistNow() {
        cancelPersistWork();
        processActiveNoteFromEditor({ sanitize: true, syncDOM: false });

        const payload = {
          version: 3,
          theme: state.theme,
          sidebarCollapsed: state.sidebarCollapsed,
          view: state.view,
          notes: state.notes,
          folders: state.folders,
          tags: state.tags
        };

        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          updateSaveMessage("Saved locally");
        } catch (error) {
          console.error(error);
          updateSaveMessage("Save failed");
          showToast("Local storage is full or unavailable.");
        }
      }

      function schedulePersist() {
        updateSaveMessage("Changes pending");
        cancelPersistWork();
        state.saveTimer = setTimeout(() => {
          updateSaveMessage("Saving…");
          if ("requestIdleCallback" in window) {
            state.persistHandle = window.requestIdleCallback(() => {
              state.persistHandle = null;
              persistNow();
            }, { timeout: 1500 });
          } else {
            state.persistHandle = setTimeout(() => {
              state.persistHandle = null;
              persistNow();
            }, 0);
          }
        }, 1800);
      }

      function scheduleBoardRefresh(delay = 500) {
        clearTimeout(state.boardTimer);
        state.boardTimer = setTimeout(() => {
          renderHeader();
          renderBoard();
        }, delay);
      }

      function scheduleEditorSync() {
        clearTimeout(state.editorSyncTimer);
        state.editorSyncTimer = setTimeout(() => {
          processActiveNoteFromEditor({ sanitize: false, syncDOM: false });
          renderEditorStatus();
          scheduleBoardRefresh(0);
          schedulePersist();
        }, 420);
      }

      function createNote() {
        const inheritedFolder = state.view.kind === "folder" ? state.view.id : null;
        const inheritedTag = state.view.kind === "tag" ? state.view.id : null;

        if (state.view.kind === "system" && state.view.id !== "all") {
          state.view = { kind: "system", id: "all" };
        }

        state.query = "";
        const timestamp = now();
        const note = {
          id: uid(),
          title: "",
          content: "",
          pinned: false,
          archived: false,
          trashed: false,
          folderId: inheritedFolder,
          tags: inheritedTag ? [inheritedTag] : [],
          fontSize: 16,
          createdAt: timestamp,
          updatedAt: timestamp,
          ...deriveMeta("", "")
        };

        state.notes.unshift(note);
        state.activeNoteId = note.id;
        state.editorOpen = true;
        state.settingsOpen = false;
        state.openNoteMenuId = null;
        state.renderedNoteId = null;
        state.savedSelection = null;

        renderApp();
        schedulePersist();

        requestAnimationFrame(() => {
          els.editorTitleInput.focus();
          closeMobileSidebar();
        });
      }

      function openEditor(noteId, focus = "body") {
        if (!getNote(noteId)) return;
        state.activeNoteId = noteId;
        state.editorOpen = true;
        state.settingsOpen = false;
        state.openNoteMenuId = null;
        state.savedSelection = null;
        state.renderedNoteId = null;
        renderApp();

        requestAnimationFrame(() => {
          if (focus === "title") els.editorTitleInput.focus();
          else els.editorBody.focus();
          closeMobileSidebar();
        });
      }

      function closeEditor() {
        processActiveNoteFromEditor({ sanitize: true, syncDOM: true });
        state.editorOpen = false;
        state.renderedNoteId = null;
        state.savedSelection = null;
        persistNow();
        renderHeader();
        renderBoard();
        renderEditorPanel();
      }

      function updateTitleInput() {
        if (state.syncingEditor) return;
        const note = getNote();
        if (!note || note.trashed) return;
        note.title = els.editorTitleInput.value.slice(0, 160);
        note.updatedAt = now();
        renderEditorStatus();
        scheduleBoardRefresh();
        schedulePersist();
      }

      function updateFolderAssignment() {
        const note = getNote();
        if (!note || note.trashed) return;
        note.folderId = els.folderSelect.value || null;
        note.updatedAt = now();
        renderSelectedTags(note.tags);
        renderSidebar();
        renderHeader();
        renderBoard();
        renderEditorStatus();
        schedulePersist();
      }

      function updateFontSize() {
        const note = getNote();
        if (!note || note.trashed) return;
        note.fontSize = clampFontSize(els.fontSizeSelect.value);
        els.editorBody.style.fontSize = note.fontSize + "px";
        note.updatedAt = now();
        renderEditorStatus();
        schedulePersist();
      }

      function duplicateNote(noteId) {
        const original = getNote(noteId);
        if (!original) return;

        state.view = { kind: "system", id: "all" };
        state.query = "";

        const timestamp = now();
        const copy = normalizeNote({
          ...original,
          id: uid(),
          title: getNoteTitle(original) + " Copy",
          pinned: false,
          archived: false,
          trashed: false,
          createdAt: timestamp,
          updatedAt: timestamp
        });

        state.notes.unshift(copy);
        state.activeNoteId = copy.id;
        state.editorOpen = true;
        state.renderedNoteId = null;
        renderApp();
        schedulePersist();
        showToast("Note duplicated.");
      }

      function exportNote(note) {
        const title = getNoteTitle(note);
        const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(title)}</title>
<style>
body{font-family:Inter,system-ui,sans-serif;max-width:820px;margin:40px auto;padding:0 20px;line-height:1.72;color:#1d1712;background:#fffaf4}

blockquote{border-left:3px solid #8f6d54;padding-left:16px;color:#6f5d50}
